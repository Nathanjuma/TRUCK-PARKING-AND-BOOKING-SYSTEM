  <style>
    * { font-family: 'Poppins', sans-serif; }
    html, body { height: 100%; margin: 0; }
    .app-wrapper { height: 100%; overflow-y: auto; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #F4F4F4; }
    ::-webkit-scrollbar-thumb { background: #001F3F; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #003366; }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
    .animate-pulse-hover:hover { animation: pulse 0.3s ease-in-out; }
    
    /* Stagger animations */
    .stagger-1 { animation-delay: 0.1s; opacity: 0; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; }
    .stagger-4 { animation-delay: 0.4s; opacity: 0; }
    
    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      z-index: 1000;
      transform: translateX(120%);
      transition: transform 0.3s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: linear-gradient(135deg, #10B981, #059669); }
    .toast.error { background: linear-gradient(135deg, #EF4444, #DC2626); }
    
    /* Button hover effects */
    .btn-primary {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
    }
    
    .btn-secondary {
      background: #001F3F;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: #003366;
      transform: translateY(-2px);
    }
    
    /* Card hover effects */
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 31, 63, 0.15);
    }
    
    /* Star rating */
    .star { cursor: pointer; transition: all 0.2s ease; }
    .star:hover { transform: scale(1.2); }
    .star.active { color: #FFD700; }
    .star.inactive { color: #D1D5DB; }
    
    /* Modal backdrop */
    .modal-backdrop {
      background: rgba(0, 31, 63, 0.8);
      backdrop-filter: blur(4px);
    }
    
    /* Input focus states */
    .input-styled {
      transition: all 0.3s ease;
      border: 2px solid #E5E7EB;
    }
    .input-styled:focus {
      border-color: #FFD700;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
      outline: none;
    }
    
    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Hero pattern */
    .hero-pattern {
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 30%);
    }
    
    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #F4F4F4 25%, #E5E7EB 50%, #F4F4F4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Mobile optimizations */
@media (max-width: 640px) {
  .text-4xl { font-size: 2rem; }
  .text-3xl { font-size: 1.75rem; }
  .p-8 { padding: 1.5rem; }
  
  /* Better touch targets */
  button, a, .cursor-pointer {
    min-height: 44px;
    min-width: 44px;
  }
  
  /* Swipe gestures */
  .swipeable {
    touch-action: pan-y pinch-zoom;
  }
  
  /* Bottom sheet for mobile */
  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 100;
  }
  
  .bottom-sheet.show {
    transform: translateY(0);
  }
  
  /* Pull to refresh */
  .ptr-element {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    color: #FFD700;
    text-align: center;
    height: 50px;
    transform: translateY(-50px) translateZ(0);
    transition: transform 0.3s;
  }
  
  .ptr-element.refresh {
    transform: translateY(0) translateZ(0);
  }
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: light dark;
  }
}

/* Loading skeleton for mobile */
.skeleton-mobile {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

  <script>
    // ===== CONFIGURATION =====
    const defaultConfig = {
      app_title: 'TruckPark Pro',
      tagline: 'Find & Book Secure Truck Parking',
      cta_button_text: 'Find Parking Now',
      background_color: '#F4F4F4',
      surface_color: '#FFFFFF',
      text_color: '#001F3F',
      primary_action_color: '#FFD700',
      secondary_action_color: '#001F3F'
    };
    
    let config = { ...defaultConfig };
    
    // ===== APP STATE =====
    let appState = {
      currentUser: null,
      currentPage: 'home',
      users: [],
      stations: [],
      bookings: [],
      reviews: [],
      isLoading: false
    };
    
    // ===== TOAST NOTIFICATION =====
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // ===== MOBILE MENU =====
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }
    
    // ===== MODAL FUNCTIONS =====
    function openModal(content) {
      const container = document.getElementById('modal-container');
      const modalContent = document.getElementById('modal-content');
      modalContent.innerHTML = content;
      container.classList.remove('hidden');
    }
    
    function closeModal() {
      document.getElementById('modal-container').classList.add('hidden');
    }
    
    // Close modal on backdrop click
    document.getElementById('modal-container').addEventListener('click', (e) => {
      if (e.target.id === 'modal-container') closeModal();
    });
    
    // ===== NAVIGATION =====
    function navigate(page, data = null) {
      appState.currentPage = page;
      renderPage(page, data);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // ===== DATA SDK HANDLER =====
    const dataHandler = {
      onDataChanged(data) {
        // Categorize data by type
        appState.users = data.filter(d => d.type === 'user');
        appState.stations = data.filter(d => d.type === 'station');
        appState.bookings = data.filter(d => d.type === 'booking');
        appState.reviews = data.filter(d => d.type === 'review');
        
        // Check if current user still exists
        if (appState.currentUser) {
          const user = appState.users.find(u => u.__backendId === appState.currentUser.__backendId);
          if (user) {
            appState.currentUser = user;
          }
        }
        
        updateAuthNav();
        renderPage(appState.currentPage);
      }
    };
    
    // ===== AUTH NAV UPDATE =====
    function updateAuthNav() {
  const desktopNav = document.getElementById('auth-nav-desktop');
  const mobileNav = document.getElementById('auth-nav-mobile');
  
  console.log('Updating auth nav, current user:', appState.currentUser);
  
  // Also check localStorage in case appState is empty but user exists
  if (!appState.currentUser) {
    const savedUser = localStorage.getItem('truckpark_user');
    if (savedUser) {
      try {
        appState.currentUser = JSON.parse(savedUser);
        console.log('Restored user from localStorage in updateAuthNav:', appState.currentUser);
      } catch (e) {
        console.error('Failed to parse saved user:', e);
      }
    }
  }
  
  if (appState.currentUser) {
    const role = appState.currentUser.role;
    console.log('User role is:', role);
    
    const dashboardLink = role === 'owner' ? 
      `<a onclick="navigate('owner-dashboard')" class="text-white hover:text-gold transition cursor-pointer">Dashboard</a>` :
      `<a onclick="navigate('driver-dashboard')" class="text-white hover:text-gold transition cursor-pointer">My Bookings</a>`;
    
    desktopNav.innerHTML = `
      <div class="flex items-center space-x-4">
        ${dashboardLink}
        <span class="text-gold">👤 ${appState.currentUser.name}</span>
        <button onclick="logout()" class="bg-gold text-dark-blue px-4 py-2 rounded-lg font-medium hover:bg-yellow-400 transition">Logout</button>
      </div>
    `;
    
    mobileNav.innerHTML = `
      <a onclick="navigate('${role === 'owner' ? 'owner-dashboard' : 'driver-dashboard'}'); toggleMobileMenu()" class="block text-white hover:text-gold py-2 cursor-pointer">${role === 'owner' ? 'Dashboard' : 'My Bookings'}</a>
      <div class="text-gold py-2">👤 ${appState.currentUser.name}</div>
      <button onclick="logout(); toggleMobileMenu()" class="w-full bg-gold text-dark-blue px-4 py-2 rounded-lg font-medium mt-2">Logout</button>
    `;
  } else {
    desktopNav.innerHTML = `
      <div class="flex items-center space-x-3">
        <button onclick="navigate('login')" class="text-white hover:text-gold transition">Login</button>
        <button onclick="navigate('register')" class="btn-primary text-dark-blue px-4 py-2 rounded-lg font-medium">Register</button>
      </div>
    `;
    
    mobileNav.innerHTML = `
      <a onclick="navigate('login'); toggleMobileMenu()" class="block text-white hover:text-gold py-2 cursor-pointer">Login</a>
      <button onclick="navigate('register'); toggleMobileMenu()" class="w-full btn-primary text-dark-blue px-4 py-2 rounded-lg font-medium mt-2">Register</button>
    `;
  }
}
    
    // ===== PAGE TEMPLATES =====
    function getHomePage() {

              <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="navigate('stations')" id="hero-cta" class="btn-primary text-dark-blue px-8 py-4 rounded-xl font-semibold text-lg animate-pulse-hover">

                </button>
                <button onclick="navigate('register')" class="btn-secondary text-white px-8 py-4 rounded-xl font-semibold text-lg border-2 border-gold">
                  Become a Partner
                </button>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Stats Section -->
        <section class="py-12 bg-white">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
              <div class="text-center p-6 animate-fade-in stagger-1">
                <div class="text-4xl mb-2">🚛</div>
                <div class="text-3xl font-bold text-dark-blue">${appState.stations.length}+</div>
                <div class="text-gray-500">Parking Stations</div>
              </div>
              <div class="text-center p-6 animate-fade-in stagger-2">
                <div class="text-4xl mb-2">👥</div>
                <div class="text-3xl font-bold text-dark-blue">${appState.users.filter(u => u.role === 'driver').length}+</div>
                <div class="text-gray-500">Drivers</div>
              </div>
              <div class="text-center p-6 animate-fade-in stagger-3">
                <div class="text-4xl mb-2">📍</div>
                <div class="text-3xl font-bold text-dark-blue">${appState.bookings.length}+</div>
                <div class="text-gray-500">Bookings Made</div>
              </div>

            </div>
          </div>
        </section>
        
        <!-- Features Section -->
        <section class="py-16 bg-light-gray">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl md:text-4xl font-bold text-center text-dark-blue mb-12">
              Why Choose <span class="gradient-text">TruckPark Pro</span>?
            </h2>
            <div class="grid md:grid-cols-3 gap-8">
              <div class="bg-white p-8 rounded-2xl shadow-lg card-hover animate-fade-in stagger-1">
                <div class="w-16 h-16 bg-gold/20 rounded-2xl flex items-center justify-center text-3xl mb-6">🔒</div>
                <h3 class="text-xl font-bold text-dark-blue mb-3">Secure Parking</h3>
                <p class="text-gray-600">All stations feature CCTV, security guards, and fenced areas for maximum protection.</p>
              </div>
              <div class="bg-white p-8 rounded-2xl shadow-lg card-hover animate-fade-in stagger-2">
                <div class="w-16 h-16 bg-gold/20 rounded-2xl flex items-center justify-center text-3xl mb-6">📱</div>
                <h3 class="text-xl font-bold text-dark-blue mb-3">Easy Booking</h3>
                <p class="text-gray-600">Book your spot in seconds from your phone or computer. Instant confirmation.</p>
              </div>
              <div class="bg-white p-8 rounded-2xl shadow-lg card-hover animate-fade-in stagger-3">
                <div class="w-16 h-16 bg-gold/20 rounded-2xl flex items-center justify-center text-3xl mb-6">💰</div>
                <h3 class="text-xl font-bold text-dark-blue mb-3">Best Prices</h3>
                <p class="text-gray-600">Competitive pricing with transparent rates. No hidden fees or surprises.</p>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Featured Stations -->
        <section class="py-16 bg-white">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl md:text-4xl font-bold text-center text-dark-blue mb-4">
              Featured Stations
            </h2>
            <p class="text-gray-500 text-center mb-12">Top-rated parking locations trusted by drivers</p>
            <div class="grid md:grid-cols-3 gap-6" id="featured-stations">
              ${appState.stations.slice(0, 3).map((station, index) => getStationCard(station, index)).join('')}
              ${appState.stations.length === 0 ? `
                <div class="col-span-3 text-center py-12">
                  <div class="text-6xl mb-4">🏗️</div>
                  <p class="text-gray-500 text-lg">No stations available yet. Be the first to add one!</p>
                  <button onclick="navigate('register')" class="btn-primary text-dark-blue px-6 py-3 rounded-xl font-medium mt-4">
                    Register as Owner
                  </button>
                </div>
              ` : ''}
            </div>
            ${appState.stations.length > 3 ? `
              <div class="text-center mt-8">
                <button onclick="navigate('stations')" class="btn-secondary text-white px-8 py-3 rounded-xl font-medium">
                  View All Stations →
                </button>
              </div>
            ` : ''}
          </div>
        </section>
        
        <!-- CTA Section -->
        <section class="py-16 bg-dark-blue hero-pattern">
          <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-6">
              Ready to Get Started?
            </h2>
            <p class="text-gray-300 text-lg mb-8">
              Join thousands of drivers and parking owners on our platform
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
              <button onclick="navigate('register')" class="btn-primary text-dark-blue px-8 py-4 rounded-xl font-semibold text-lg">
                🚛 Register as Driver
              </button>
              <button onclick="navigate('register')" class="bg-transparent border-2 border-gold text-gold px-8 py-4 rounded-xl font-semibold text-lg hover:bg-gold hover:text-dark-blue transition">
                🏢 Register as Owner
              </button>
            </div>
          </div>
        </section>
      `;
    }
    
    function getStationCard(station, index = 0) {
  // Get consistent station ID
  const stationId = station.id || station.__backendId;
  
  const stationReviews = appState.reviews.filter(r => r.station_id == stationId);
  const avgRating = stationReviews.length > 0 
    ? (stationReviews.reduce((a,b) => a + b.rating, 0) / stationReviews.length).toFixed(1) 
    : 'New';
  
  const securityFeatures = station.security_features ? station.security_features.split(',').map(f => f.trim()) : [];
  const amenities = station.amenities ? station.amenities.split(',').map(a => a.trim()) : [];
  
  return `
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden card-hover animate-fade-in stagger-${(index % 4) + 1}">

   function filterStations() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  const locationFilter = document.getElementById('location-filter').value;
  const sortFilter = document.getElementById('sort-filter').value;
  
  let filtered = appState.stations.filter(station => {
    const matchesSearch = station.station_name.toLowerCase().includes(searchTerm) || 
                        station.location.toLowerCase().includes(searchTerm);
    const matchesLocation = !locationFilter || station.location === locationFilter;
    return matchesSearch && matchesLocation;
  });
  
  // Sort
  switch(sortFilter) {
    case 'price-low':
      filtered.sort((a, b) => a.price_per_night - b.price_per_night);
      break;
    case 'price-high':
      filtered.sort((a, b) => b.price_per_night - a.price_per_night);
      break;
    case 'availability':
      filtered.sort((a, b) => b.available_slots - a.available_slots);
      break;
    default:
      filtered.sort((a, b) => a.station_name.localeCompare(b.station_name));
  }
  
  const grid = document.getElementById('stations-grid');
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="col-span-3 text-center py-16">
        <div class="text-8xl mb-6">🔍</div>
        <h3 class="text-2xl font-bold text-dark-blue mb-4">No Results Found</h3>
        <p class="text-gray-500">Try adjusting your search or filters</p>
      </div>
    `;
  } else {
    grid.innerHTML = filtered.map((station, index) => getStationCard(station, index)).join('');
  }
}

    function setRating(rating) {
      document.getElementById('review-rating').value = rating;
      const stars = document.querySelectorAll('#star-rating .star');
      stars.forEach((star, index) => {
        star.classList.toggle('active', index < rating);
        star.classList.toggle('inactive', index >= rating);
      });
    }

  const requirements = {
    length: password.length >= 8,
    upper: /[A-Z]/.test(password),
    lower: /[a-z]/.test(password),
    number: /[0-9]/.test(password),
    special: /[!@#$%^&*]/.test(password)
  };
  
  // Update requirement indicators
  document.getElementById('req-length').innerHTML = requirements.length 
    ? '✓ 8+ characters' 
    : '○ 8+ characters';
  document.getElementById('req-length').className = 'text-xs ' + (requirements.length ? 'text-green-600 font-medium' : 'text-gray-400');
  
  document.getElementById('req-upper').innerHTML = requirements.upper 
    ? '✓ Uppercase (A-Z)' 
    : '○ Uppercase (A-Z)';
  document.getElementById('req-upper').className = 'text-xs ' + (requirements.upper ? 'text-green-600 font-medium' : 'text-gray-400');
  
  document.getElementById('req-lower').innerHTML = requirements.lower 
    ? '✓ Lowercase (a-z)' 
    : '○ Lowercase (a-z)';
  document.getElementById('req-lower').className = 'text-xs ' + (requirements.lower ? 'text-green-600 font-medium' : 'text-gray-400');
  
  document.getElementById('req-number').innerHTML = requirements.number 
    ? '✓ Number (0-9)' 
    : '○ Number (0-9)';
  document.getElementById('req-number').className = 'text-xs ' + (requirements.number ? 'text-green-600 font-medium' : 'text-gray-400');
  
  document.getElementById('req-special').innerHTML = requirements.special 
    ? '✓ Special (!@#$%^&*)' 
    : '○ Special (!@#$%^&*)';
  document.getElementById('req-special').className = 'text-xs ' + (requirements.special ? 'text-green-600 font-medium' : 'text-gray-400');
  
  // Update strength bars
  const metCount = Object.values(requirements).filter(Boolean).length;
  for (let i = 1; i <= 5; i++) {
    const bar = document.getElementById(`strength-${i}`);
    if (i <= metCount) {
      bar.className = 'strength-bar flex-1 h-2 rounded-full ' + 
        (metCount <= 2 ? 'bg-red-500' : 
         metCount <= 3 ? 'bg-yellow-500' : 
         metCount <= 4 ? 'bg-blue-500' : 
         'bg-green-500');
    } else {
      bar.className = 'strength-bar flex-1 h-2 rounded-full bg-gray-200';
    }
  }
  
  // Update strength text
  const strengthText = document.getElementById('strength-text');
  if (metCount === 0) {
    strengthText.textContent = 'Requirements: (0/5)';
    strengthText.className = 'text-xs text-gray-400';
  } else if (metCount <= 2) {
    strengthText.textContent = `Weak password (${metCount}/5)`;
    strengthText.className = 'text-xs text-red-500 font-medium';
  } else if (metCount <= 3) {
    strengthText.textContent = `Fair password (${metCount}/5)`;
    strengthText.className = 'text-xs text-yellow-600 font-medium';
  } else if (metCount <= 4) {
    strengthText.textContent = `Good password (${metCount}/5)`;
    strengthText.className = 'text-xs text-blue-600 font-medium';
  } else {
    strengthText.textContent = 'Strong password! ✓ (5/5)';
    strengthText.className = 'text-xs text-green-600 font-medium';
  }
  
  updateFormState();
}

function updatePasswordMatch() {
  const password = document.getElementById('register-password').value;
  const confirmPassword = document.getElementById('register-confirm-password').value;
  const matchStatus = document.getElementById('password-match-status');
  
  if (confirmPassword === '') {
    matchStatus.innerHTML = '○ Passwords must match';
    matchStatus.className = 'text-xs text-gray-400 mt-1';
  } else if (password === confirmPassword) {
    matchStatus.innerHTML = '✓ Passwords match';
    matchStatus.className = 'text-xs text-green-600 font-medium mt-1';
  } else {
    matchStatus.innerHTML = '✗ Passwords do not match';
    matchStatus.className = 'text-xs text-red-500 font-medium mt-1';
  }
  
  updateFormState();
}

function updateFormState() {
  const btn = document.getElementById('register-btn');
  const password = document.getElementById('register-password').value;
  const confirmPassword = document.getElementById('register-confirm-password').value;
  const termsAccepted = document.getElementById('register-terms').checked;

    lower: /[a-z]/.test(password),

    special: /[!@#$%^&*]/.test(password)

  const passwordsMatch = password === confirmPassword && password !== '';
  const isEnabled = allPasswordMet && passwordsMatch && termsAccepted;

    function renderPage(page, data = null) {
  const main = document.getElementById('main-content');
  console.log('Rendering page:', page, 'Current user:', appState.currentUser);
  
  // Check localStorage for user if appState is empty
  if (!appState.currentUser) {
    const savedUser = localStorage.getItem('truckpark_user');
    if (savedUser) {
      try {
        appState.currentUser = JSON.parse(savedUser);
        console.log('Restored user from localStorage in renderPage:', appState.currentUser);
      } catch (e) {
        console.error('Failed to parse saved user:', e);
      }
    }
  }
  
  switch(page) {
    case 'home':
      main.innerHTML = getHomePage();
      break;
    case 'stations':
      main.innerHTML = getStationsPage();
      break;
    case 'station-details':
      main.innerHTML = getStationDetailsPage(data?.stationId);
      break;
    case 'login':
      main.innerHTML = getLoginPage();
      break;
    case 'register':
      main.innerHTML = getRegisterPage();
      break;
    case 'driver-dashboard':
      if (!appState.currentUser || appState.currentUser.role !== 'driver') {
        console.log('Not a driver, redirecting to login');
        navigate('login');
        return;
      }
      main.innerHTML = getDriverDashboard();
      break;
    case 'owner-dashboard':
      if (!appState.currentUser || appState.currentUser.role !== 'owner') {
        console.log('Not an owner, redirecting to login. Current role:', appState.currentUser?.role);
        navigate('login');
        return;
      }
      console.log('Rendering owner dashboard');
      main.innerHTML = getOwnerDashboard();
      break;
    default:
      main.innerHTML = getHomePage();
  }
}

      appState.currentUser = JSON.parse(savedUser);

      console.error('Failed to parse saved user:', e);

    console.log('Reviews:', appState.reviews.length);
    console.log('Users:', appState.users.length);
    
  } catch (error) {
    console.error('Failed to fetch initial data:', error);
  }
  
  // Initial render
  updateAuthNav();
  
  // Navigate to appropriate page
  if (appState.currentUser) {
    // If user is logged in, go to their dashboard
    if (appState.currentUser.role === 'owner') {
      renderPage('owner-dashboard');
    } else {
      renderPage('driver-dashboard');
    }
  } else {
    // If no user, go to home
    renderPage('home');
  }
}

  try {
    const response = await fetch('users.php');

    if (result.success && result.data) {
      appState.users = result.data;
      console.log('Users updated:', appState.users.length);
      return true;
    }
    return false;
  } catch (error) {
    console.error('Fetch users error:', error);
    return false;
  }

let startY = 0;
let pulling = false;

document.addEventListener('touchstart', (e) => {
  if (window.scrollY === 0) {
    startY = e.touches[0].clientY;
    pulling = true;
  }
});

document.addEventListener('touchmove', (e) => {
  if (!pulling) return;
  
  const currentY = e.touches[0].clientY;
  const diff = currentY - startY;
  
  if (diff > 0 && diff < 100) {
    const ptr = document.querySelector('.ptr-element');
    if (ptr) {
      ptr.style.transform = `translateY(${diff - 50}px)`;
    }
  }
});

document.addEventListener('touchend', (e) => {
  if (!pulling) return;
  
  const ptr = document.querySelector('.ptr-element');
  if (ptr) {
    ptr.style.transform = 'translateY(-50px)';
    // Refresh data
    Promise.all([
      fetchStations(),
      fetchBookings(),
      fetchReviews()
    ]).then(() => {
      renderPage(appState.currentPage);
    });
  }
  
  pulling = false;
});
